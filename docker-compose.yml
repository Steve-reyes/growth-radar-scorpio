services:
  api:
    build: ./backend
    container_name: growth-radar-bc-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - growth_radar_bc_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=Growth Radar BC
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,https://bc.growthradar.87.106.124.206.nip.io

volumes:
  growth_radar_bc_data:
