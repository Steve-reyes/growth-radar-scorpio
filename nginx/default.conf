server {
    listen 80;
    server_name growth-radar.212.227.153.56.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name growth-radar.212.227.153.56.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/growth-radar.212.227.153.56.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growth-radar.212.227.153.56.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 16M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    root /var/www/growth-radar;
    index index.html;

    location /_next/ {
        alias /var/www/growth-radar/_next/;
        expires 30d;
        add_header Cache-Control "public, immutable, must-revalidate";
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
